<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luko</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F111A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Luko" />
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1lTDhliXO2JSyOyDP85wDBTa_RK_EcC7I" />
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1lTDhliXO2JSyOyDP85wDBTa_RK_EcC7I" />
    <script>
      // Suppress Vite WebSocket errors which are common in the preview environment
      (function() {
        const suppress = (e) => {
          const msg = e.message || (e.error && e.error.message) || (e.reason && (e.reason.message || e.reason)) || '';
          if (typeof msg === 'string' && (msg.includes('WebSocket') || msg.includes('[vite]'))) {
            e.stopImmediatePropagation();
            e.preventDefault();
            return true;
          }
          return false;
        };
        window.addEventListener('error', suppress, true);
        window.addEventListener('unhandledrejection', suppress, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
